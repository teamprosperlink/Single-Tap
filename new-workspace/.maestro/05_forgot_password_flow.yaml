appId: com.plink.supper
---
# =============================================================
# TEST: Forgot / Reset Password Flow
# Verifies the 3-step password reset process
# =============================================================

# Step 1: Launch app fresh
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Step 2: Skip onboarding
- tapOn: "Skip"
- waitForAnimationToEnd

# Step 3: Select Personal account type & continue
- tapOn: "Personal / Individual"
- tapOn: "Continue"
- waitForAnimationToEnd

# Step 4: Verify login screen
- assertVisible: "Log In"

# Step 5: Tap Forgot Password link
- tapOn: "Forgot Password?"
- waitForAnimationToEnd

# Step 6: Verify Reset Password screen
- assertVisible: "Reset Password"

# Step 7: Verify step indicators
- assertVisible: "Phone"
- assertVisible: "OTP"
- assertVisible: "Password"

# Step 8: Verify Step 1 - Enter Mobile Number
- assertVisible: "Enter Mobile Number"
- assertVisible: "We will send you an OTP to verify"

# Step 9: Enter phone number
- tapOn: "Enter phone number"
- inputText: "9876543210"

# Step 10: Tap Send OTP
- tapOn: "Send OTP"
- waitForAnimationToEnd

# Step 11: Verify Step 2 - OTP entry screen
- assertVisible: "Enter OTP"

# Step 12: Verify Change Phone Number link
- assertVisible: "Change Phone Number"

# Step 13: Take screenshot of OTP screen
- takeScreenshot: 05_forgot_password_otp_screen

# Note: OTP verification requires actual SMS - this test validates
# the UI flow up to the OTP entry point. In a real test environment
# with a test backend, you would enter the OTP and continue.
