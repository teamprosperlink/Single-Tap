name: Keep Backend Alive

on:
  schedule:
    # Ping every 5 minutes to prevent Render free tier from sleeping
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -s -o /dev/null -w "Health: %{http_code} in %{time_total}s\n" \
            "https://singletap-backend.onrender.com/health" \
            --max-time 120 || true

      - name: Ping search endpoint (keeps AI models loaded)
        run: |
          curl -s -o /dev/null -w "Search: %{http_code} in %{time_total}s\n" \
            -X POST "https://singletap-backend.onrender.com/search-and-match" \
            -H "Content-Type: application/json" \
            -d '{"query": "", "user_id": "keep-alive"}' \
            --max-time 120 || true
